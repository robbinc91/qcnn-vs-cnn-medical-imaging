defaults:
  - dataset: mnist
  - model: classical_cnn
  - _self_

seed: 42
device: auto  # auto, cpu, cuda

training:
  epochs: 50
  batch_size: 64
  learning_rate: 0.001
  optimizer: adam
  weight_decay: 1e-4
  scheduler: cosine
  early_stopping_patience: 10

evaluation:
  metrics:
    - accuracy
    - f1_macro
    - precision
    - recall
  save_confusion_matrix: true
  save_predictions: true

logging:
  tensorboard: true
  log_interval: 10  # batches
  save_checkpoints: true
  checkpoint_dir: checkpoints/

hydra:
  run:
    dir: run/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: run/outputs/sweeps/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
