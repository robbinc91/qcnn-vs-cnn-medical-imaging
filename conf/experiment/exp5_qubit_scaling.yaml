# @package _global_
#
# Experiment 5: Qubit Scaling Study
# Vary number of qubits and circuit depth
# Goal: Find optimal qubit/depth tradeoff and identify barren plateau onset

defaults:
  - override /dataset: mnist
  - override /model: qcnn_pennylane

seed: 42

dataset:
  binary_classes: [3, 6]
  subsample: 1000

training:
  epochs: 30
  batch_size: 32
  learning_rate: 0.001

# Sweep over qubit counts and circuit depths
# Run via: python run/pipeline/train.py -m experiment=exp5_qubit_scaling \
#   model.quantum.num_qubits=4,6,8,10,12 model.quantum.num_layers=2,4,6,8
