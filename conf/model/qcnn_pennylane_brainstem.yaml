# PennyLane hybrid quantum-classical U-Net for brainstem segmentation.
# Classical conv U-Net (3-stage encoder below) + additive global quantum branch.
# enc_channels [80,160,320] => ~6.09M in 2D (3x3 kernels) and ~17.6M in 3D
# (3x3x3 kernels, ~3x cost) for the SAME config. The native 2D model is thus
# ~1/3 of the ~17M classical field, i.e. NOT parameter-matched in 2D. The
# parameter-matched 2D study overrides enc_channels=[80,160,320,480] (=16.90M).
# (Earlier "sized to match SwinUNETR ~6M 2D" was wrong: SwinUNETR-2D is ~16.8M.)

name: qcnn_pennylane
type: quantum
framework: pennylane

enc_channels: [80, 160, 320]

quantum:
  num_qubits: 8
  num_layers: 4
  entanglement: circular
  ansatz: strongly_entangling
  diff_method: best
  device: default.qubit

decoder_dropout: 0.2
